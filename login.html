<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Acceso | GIC CONTROL 360</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="/css/login.css">
</head>
<body>
  <main class="shell">
    <section class="brand">
      <div class="eyebrow">Acceso seguro</div>
      <h1>GIC CONTROL <span>360</span></h1>
      <p>Autenticacion por usuario, sesion firmada y permisos por dashboard.</p>
    </section>

    <section class="panel" aria-labelledby="login-title">
      <div class="panel-head">
        <div>
          <p class="kicker">SYSTEM/ADMINS/CORP AGR3</p>
          <h2 id="login-title">Iniciar sesion</h2>
        </div>
        <i class="bi bi-shield-lock"></i>
      </div>

      <form id="loginForm" class="form" autocomplete="on">
        <label>
          Usuario
          <input id="username" name="username" type="text" autocomplete="username" required>
        </label>
        <label>
          Contrasena
          <input id="password" name="password" type="password" autocomplete="current-password" required>
        </label>
        <input id="next" name="next" type="hidden" value="/">
        <button type="submit">
          <i class="bi bi-box-arrow-in-right"></i>
          Acceder
        </button>
        <p id="message" class="message" role="status" aria-live="polite"></p>
      </form>

      <a class="back" href="/">
        <i class="bi bi-arrow-left"></i>
        Volver al panel central
      </a>
    </section>
  </main>
  <script src="/js/auth.js"></script>
</body>
</html>
